name: Update Stock Prices Daily

on:
  schedule:
    - cron: '0 9 * * 1-5'   # 16h giờ VN (9h UTC), thứ 2-6
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install vnstock
        run: pip install vnstock --quiet

      - name: Fetch prices
        env:
          VNSTOCK_API_KEY: ${{ secrets.VNSTOCK_API_KEY }}
        run: python fetch_prices.py

      - name: Commit & push
        run: |
          git config --global user.name 'StockBot'
          git config --global user.email 'bot@github.com'
          git add prices.json
          git diff --staged --quiet || git commit -m "📈 Cập nhật giá $(date +'%d/%m/%Y')"
          git push
